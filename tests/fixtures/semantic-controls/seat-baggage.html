<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Semantic control replay</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 900px; font-family: Arial, sans-serif; background: #f4f6f8; }
    main { width: 760px; margin: 40px auto; padding: 24px; background: white; }
    button, label { min-height: 36px; padding: 8px 14px; }
    #support { margin-top: 420px; }
    #tiny-seat-helper { position: fixed; top: 2px; left: 2px; width: 3px; min-height: 0; height: 3px; padding: 0; overflow: hidden; }
    #bag-modal { position: fixed; z-index: 20; left: 160px; top: 90px; width: 520px; min-height: 260px; padding: 24px; background: white; border: 2px solid #222; box-shadow: 0 8px 30px #0004; }
    .choice-row { display: flex; gap: 16px; margin-top: 24px; }
    .field-row { margin-top: 18px; }
    .field-row label { display: block; padding: 0; min-height: 0; margin-bottom: 6px; }
    .field-row input { width: 100%; min-height: 38px; padding: 8px; }
    footer { margin-top: 40px; padding: 24px; background: #111; color: white; }
    footer a { display: inline-block; min-width: 180px; min-height: 36px; margin-right: 16px; color: white; }
  </style>
</head>
<body>
  <button id="tiny-seat-helper" role="button" aria-label="Skip seat selection"></button>
  <main>
    <h1>Review your trip</h1>
    <button id="real-next" type="button">Next</button>
    <section id="support" aria-labelledby="support-heading">
      <h2 id="support-heading">Premium support</h2>
      <button id="support-decline" type="button">No thanks</button>
    </section>
  </main>
  <section id="bag-modal" role="dialog" aria-modal="true" aria-labelledby="bag-heading">
    <h2 id="bag-heading">Checked baggage</h2>
    <p>Choose baggage for this flight.</p>
    <div class="field-row">
      <label id="email-label" for="email-input">E-mail</label>
      <input id="email-input" name="email" type="email" required>
    </div>
    <div class="choice-row">
      <button id="bag-decline" type="button">I'll go without</button>
      <button id="bag-paid" type="button">Add 23 kg — 44 EUR</button>
    </div>
  </section>
  <footer>
    <a id="app-store-link" data-atw-element-id="atw-el-cloned-footer" href="https://apps.apple.com/">Download the app from the App Store</a>
    <a id="play-store-link" data-atw-element-id="atw-el-cloned-footer" href="https://play.google.com/store/apps">Download the app from Google Play</a>
  </footer>
</body>
</html>
